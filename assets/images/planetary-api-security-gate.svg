<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="100%" style="display:block;max-width:800px" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="530" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Stage 4 — Security Gate Decision Flow</text>

  <!-- ══ STEP 1: Query Security Hub ══ -->
  <rect x="280" y="52" width="240" height="58" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="76" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="bold">Query Security Hub</text>
  <text x="400" y="93" text-anchor="middle" fill="#818cf8" font-size="10">HIGH / CRITICAL severity</text>
  <text x="400" y="106" text-anchor="middle" fill="#818cf8" font-size="9">WorkflowStatus=NEW • RecordState=ACTIVE</text>

  <!-- Arrow: Query → Findings diamond -->
  <line x1="400" y1="110" x2="400" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ DIAMOND 1: Findings found? ══ -->
  <!-- center (400, 195), half-w=95, half-h=48 -->
  <polygon points="400,150 495,195 400,240 305,195" fill="#2d1f0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">Findings</text>
  <text x="400" y="207" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">found?</text>

  <!-- Label: YES (left) -->
  <text x="276" y="189" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">YES</text>
  <!-- Arrow: → Override diamond (left) -->
  <line x1="305" y1="195" x2="248" y2="195" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Label: NO (right) -->
  <text x="524" y="189" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">NO</text>
  <!-- Arrow: findings=NO → right then down to Pipeline Continues -->
  <path d="M495,195 L620,195 L620,410" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ══ DIAMOND 2: Override = true? ══ -->
  <!-- center (170, 195), half-w=72, half-h=40 -->
  <polygon points="170,155 242,195 170,235 98,195" fill="#2d1f0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="190" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">Override</text>
  <text x="170" y="206" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold">= true?</text>

  <!-- Label: NO (below) -->
  <text x="170" y="256" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">NO</text>
  <!-- Arrow: Override=NO → down → BLOCKED -->
  <line x1="170" y1="235" x2="170" y2="290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Label: YES (left) -->
  <text x="58" y="189" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">YES</text>
  <!-- Arrow: Override=YES → left, then down, then right to Pipeline Continues -->
  <path d="M98,195 L40,195 L40,425 L488,425" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ══ BLOCKED box ══ -->
  <rect x="88" y="290" width="164" height="60" rx="10" fill="#3b1f1f" stroke="#ef4444" stroke-width="2"/>
  <text x="170" y="317" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">PIPELINE BLOCKED</text>
  <text x="170" y="337" text-anchor="middle" fill="#ef4444" font-size="10">CodeBuild exits with code 1</text>

  <!-- ══ Pipeline Continues box ══ -->
  <rect x="488" y="410" width="224" height="58" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="436" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">Pipeline Continues</text>
  <text x="600" y="454" text-anchor="middle" fill="#4ade80" font-size="10">→ Stage 5: Manual Approval (SNS email)</text>

  <!-- ══ INFO BOX: SSM parameter ══ -->
  <rect x="530" y="52" width="240" height="105" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="74" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="bold">SSM Override Parameter</text>
  <line x1="540" y1="82" x2="760" y2="82" stroke="#374151" stroke-width="1"/>
  <text x="650" y="98" text-anchor="middle" fill="#6b7280" font-size="9">/planetary-api/pipeline/security-override</text>
  <text x="650" y="116" text-anchor="middle" fill="#6b7280" font-size="9">Default: <tspan fill="#f87171">"false"</tspan> (gate is active)</text>
  <text x="650" y="134" text-anchor="middle" fill="#6b7280" font-size="9">Set <tspan fill="#4ade80">"true"</tspan> to bypass for known vulns</text>
  <text x="650" y="150" text-anchor="middle" fill="#6b7280" font-size="9">Resets to <tspan fill="#f87171">"false"</tspan> automatically after run</text>

  <!-- ══ INFO BOX: Semgrep + Snyk generators note ══ -->
  <rect x="88" y="385" width="260" height="46" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="218" y="404" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="bold">Gate queries findings from:</text>
  <text x="218" y="421" text-anchor="middle" fill="#6b7280" font-size="9">planetary-api-semgrep  •  planetary-api-snyk</text>

</svg>
